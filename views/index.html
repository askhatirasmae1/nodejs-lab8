<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Démo Upload avec Multer</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <h1>Téléversement de fichiers avec Multer</h1>

    <div class="card">
      <h2>Upload simple</h2>

      <form action="/upload" method="POST" enctype="multipart/form-data">
        <div class="form-group">
          <label for="fichier">Sélectionnez une image :</label>
          <input type="file" id="fichier" name="fichier" required>
          <small>Formats acceptés : JPG, JPEG, PNG, GIF, WebP. Taille max : 5 Mo.</small>
        </div>

        <button type="submit" class="btn">Téléverser</button>
      </form>
    </div>

    <div class="card">
      <h2>Upload multiple</h2>

      <form action="/upload-multiple" method="POST" enctype="multipart/form-data">
        <div class="form-group">
          <label for="fichiers">Sélectionnez plusieurs images :</label>
          <input type="file" id="fichiers" name="fichiers" multiple required>
          <small>Maximum 3 images, 5 Mo chacune.</small>
        </div>

        <button type="submit" class="btn">Téléverser</button>
      </form>
    </div>

    <div class="card">
      <h2>Upload avec métadonnées</h2>

      <form action="/upload-with-data" method="POST" enctype="multipart/form-data">
        <div class="form-group">
          <label for="titre">Titre :</label>
          <input type="text" id="titre" name="titre" required>
        </div>

        <div class="form-group">
          <label for="description">Description :</label>
          <textarea id="description" name="description" rows="3"></textarea>
        </div>

        <div class="form-group">
          <label for="image">Image principale :</label>
          <input type="file" id="image" name="image" required>
        </div>

        <div class="form-group">
          <label for="galerie">Images supplémentaires :</label>
          <input type="file" id="galerie" name="galerie" multiple>
          <small>Maximum 2 images supplémentaires.</small>
        </div>

        <button type="submit" class="btn">Téléverser</button>
      </form>
    </div>
  </div>
</body>
</html>
